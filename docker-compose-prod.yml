version: '3.8'

services:
  # Frontend
  frontend:
    build: 
      context: ./apps/frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.halallogistics.com
    depends_on:
      - api-gateway

  # API Gateway
  api-gateway:
    build: ./apps/api-gateway
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - auth-service
    deploy:
      replicas: 2

  # Auth Service
  auth-service:
    build: ./apps/auth-service
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${AUTH_DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 2

  # Certification Service
  certification-service:
    build: ./apps/certification-service
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${CERT_DATABASE_URL}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 2

  # Infrastructure
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=halal_logistics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1

  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1

volumes:
  postgres_data:
