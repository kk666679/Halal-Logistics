version: '3.8'

services:
  # Frontend
  frontend:
    build: ./apps/frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api-gateway

  # API Gateway
  api-gateway:
    build: ./apps/api-gateway
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - auth-service

  # Auth Service
  auth-service:
    build: ./apps/auth-service
    ports:
      - "3002:3000"
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/auth
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-jwt-secret
    depends_on:
      - postgres
      - redis

  # Certification Service
  certification-service:
    build: ./apps/certification-service
    ports:
      - "3003:3000"
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/certification
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  # Shipment Service
  shipment-service:
    build: ./apps/shipment-service
    ports:
      - "3004:3000"
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/shipment
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  # Inventory Service
  inventory-service:
    build: ./apps/inventory-service
    ports:
      - "3005:3000"
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/inventory
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  # Infrastructure
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=halal_logistics
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
